<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recuperar contraseña — SeedYourDreams</title>
<style>
  :root{--bg:#070d12;--card:#0d1821;--border:#1a2940;--green:#2ee59d;--orange:#ff9f43;--text:#e8f4f8;--muted:#7a9bb5}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}
  nav{border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-size:1rem;font-weight:700}.logo span{color:var(--orange)}
  .nav-back{color:var(--muted);font-size:.9rem}
  .nav-back:hover{color:var(--text)}
  a{color:inherit;text-decoration:none}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .box{width:100%;max-width:420px}
  h2{font-size:1.5rem;font-weight:800;margin-bottom:8px}
  .sub{color:var(--muted);margin-bottom:28px;font-size:.92rem;line-height:1.5}
  .field{margin-bottom:16px}
  label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:6px;font-weight:500}
  input{width:100%;background:#0a1520;border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:.95rem;outline:none;transition:border-color .2s}
  input:focus{border-color:var(--orange)}
  .btn{display:block;width:100%;padding:13px;border-radius:8px;font-weight:700;font-size:1rem;cursor:pointer;border:none;transition:opacity .2s;background:var(--orange);color:#070d12}
  .btn:hover:not(:disabled){opacity:.85}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .msg{border-radius:8px;padding:12px 14px;font-size:.88rem;margin-top:14px;display:none}
  .msg.ok{background:rgba(46,229,157,.1);border:1px solid rgba(46,229,157,.3);color:var(--green)}
  .msg.err{background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.3);color:#ff6b6b}
  .spinner{width:18px;height:18px;border:2px solid rgba(7,13,18,.3);border-top-color:#070d12;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .back-link{text-align:center;margin-top:18px;font-size:.85rem;color:var(--muted)}
  .back-link a{color:var(--orange)}
</style>
</head>
<body>
<nav>
  <div class="logo"><a href="/syd/"><span>Seed</span>YourDreams</a></div>
  <a class="nav-back" href="/syd/login.html">← Volver al login</a>
</nav>
<main>
  <div class="box">
    <h2>¿Olvidaste tu contraseña?</h2>
    <p class="sub">Introduce tu email y te enviaremos un enlace para recuperar el acceso.</p>
    <div class="field">
      <label>Email</label>
      <input id="email" type="email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <button class="btn" id="btn" onclick="submitForgot()">Enviar enlace</button>
    <div class="msg" id="msg"></div>
    <div class="back-link"><a href="/syd/login.html">Volver al login</a></div>
  </div>
</main>
<script src="/syd/syd.js"></script>
<script>
async function submitForgot() {
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  msg.style.display = 'none';

  if (!email) { showMsg('Introduce tu email.', 'err'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Enviando...';

  try {
    await syd.req('POST', '/auth/forgot', { email });
    showMsg('Si ese email está registrado, recibirás el enlace en breve. Revisa también la carpeta de spam.', 'ok');
    btn.style.display = 'none';
  } catch {
    showMsg('Error al procesar la solicitud. Inténtalo de nuevo.', 'err');
    btn.disabled = false;
    btn.textContent = 'Enviar enlace';
  }
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitForgot();
});
</script>
</body>
</html>
