<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nueva contraseña — SeedYourDreams</title>
<style>
  :root{--bg:#070d12;--card:#0d1821;--border:#1a2940;--green:#2ee59d;--orange:#ff9f43;--text:#e8f4f8;--muted:#7a9bb5}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}
  nav{border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center}
  .logo{font-size:1rem;font-weight:700}.logo span{color:var(--orange)}
  a{color:inherit;text-decoration:none}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .box{width:100%;max-width:420px}
  h2{font-size:1.5rem;font-weight:800;margin-bottom:8px}
  .sub{color:var(--muted);margin-bottom:28px;font-size:.92rem;line-height:1.5}
  .field{margin-bottom:16px}
  label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:6px;font-weight:500}
  input{width:100%;background:#0a1520;border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:.95rem;outline:none;transition:border-color .2s}
  input:focus{border-color:var(--orange)}
  .btn{display:block;width:100%;padding:13px;border-radius:8px;font-weight:700;font-size:1rem;cursor:pointer;border:none;transition:opacity .2s;background:var(--orange);color:#070d12}
  .btn:hover:not(:disabled){opacity:.85}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .msg{border-radius:8px;padding:12px 14px;font-size:.88rem;margin-top:14px;display:none}
  .msg.ok{background:rgba(46,229,157,.1);border:1px solid rgba(46,229,157,.3);color:var(--green)}
  .msg.err{background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.3);color:#ff6b6b}
  .spinner{width:18px;height:18px;border:2px solid rgba(7,13,18,.3);border-top-color:#070d12;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav>
  <div class="logo"><a href="/syd/"><span>Seed</span>YourDreams</a></div>
</nav>
<main>
  <div class="box" id="main-box">
    <h2>Nueva contraseña</h2>
    <p class="sub">Elige una contraseña nueva para tu cuenta.</p>
    <div class="field">
      <label>Nueva contraseña</label>
      <input id="pass1" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Repetir contraseña</label>
      <input id="pass2" type="password" placeholder="Repite la contraseña" autocomplete="new-password">
    </div>
    <button class="btn" id="btn" onclick="submitReset()">Guardar contraseña</button>
    <div class="msg" id="msg"></div>
  </div>
</main>
<script src="/syd/syd.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token');

if (!token) {
  document.getElementById('main-box').innerHTML = `
    <h2>Enlace inválido</h2>
    <p style="color:var(--muted);margin-top:12px">Este enlace no es válido o ha expirado. <a href="/syd/forgot.html" style="color:var(--orange)">Solicita uno nuevo</a>.</p>
  `;
}

async function submitReset() {
  const p1 = document.getElementById('pass1').value;
  const p2 = document.getElementById('pass2').value;
  const btn = document.getElementById('btn');

  if (p1.length < 6) { showMsg('La contraseña debe tener al menos 6 caracteres.', 'err'); return; }
  if (p1 !== p2) { showMsg('Las contraseñas no coinciden.', 'err'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Guardando...';

  try {
    await syd.req('POST', '/auth/reset', { token, password: p1 });
    showMsg('¡Contraseña actualizada! Redirigiendo al login...', 'ok');
    document.getElementById('btn').style.display = 'none';
    setTimeout(() => location.href = '/syd/login.html', 2000);
  } catch (e) {
    const errMsg = e?.data?.error || 'Error al actualizar la contraseña.';
    showMsg(errMsg, 'err');
    btn.disabled = false;
    btn.textContent = 'Guardar contraseña';
  }
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}
</script>
</body>
</html>
