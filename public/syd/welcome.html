<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bienvenido/a — SYD</title>
<script src="/syd/syd.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#070d12;--card:#0d1821;--border:#1a2940;
    --text:#e8f4f8;--muted:#7a9bb5;
    --pole-color:#2ee59d;
  }
  body{
    background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:24px;
  }

  /* Entry animation */
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  .welcome-card{animation:fadeUp .5s ease forwards}

  .welcome-card{
    background:var(--card);border:1px solid var(--border);
    border-radius:20px;max-width:520px;width:100%;
    padding:36px 32px;
    border-top:4px solid var(--pole-color);
    box-shadow:0 0 60px -10px color-mix(in srgb, var(--pole-color) 20%, transparent);
  }

  .pole-badge{
    display:inline-flex;align-items:center;gap:8px;
    background:color-mix(in srgb, var(--pole-color) 12%, transparent);
    border:1px solid color-mix(in srgb, var(--pole-color) 40%, transparent);
    color:var(--pole-color);border-radius:20px;
    padding:5px 14px;font-size:.82rem;font-weight:600;
    margin-bottom:20px;
  }

  .welcome-icon{font-size:3rem;margin-bottom:12px;display:block;text-align:center}

  h1{font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:8px}
  h1 span{color:var(--pole-color)}

  .welcome-sub{
    color:var(--muted);font-size:.9rem;text-align:center;
    margin-bottom:28px;line-height:1.5;
  }

  .context-msg{
    background:color-mix(in srgb, var(--pole-color) 6%, transparent);
    border-left:3px solid var(--pole-color);
    border-radius:0 10px 10px 0;
    padding:16px 18px;margin-bottom:28px;
    font-size:.93rem;line-height:1.65;color:var(--text);
  }

  .community-section{margin-bottom:28px}
  .community-label{
    font-size:.75rem;font-weight:600;color:var(--muted);
    text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;
  }
  .community-links{display:flex;gap:10px;flex-wrap:wrap}

  .btn-community{
    flex:1;min-width:140px;display:flex;align-items:center;
    justify-content:center;gap:9px;padding:13px 16px;
    border-radius:12px;font-weight:600;font-size:.88rem;
    text-decoration:none;transition:opacity .2s,transform .1s;border:none;cursor:pointer;
  }
  .btn-community:hover{opacity:.85;transform:translateY(-1px)}
  .btn-telegram{background:#229ED9;color:#fff}
  .btn-discord{background:#5865F2;color:#fff}

  .channel-hint{
    font-size:.75rem;opacity:.8;display:block;font-weight:400;margin-top:2px;
  }

  .btn-start{
    width:100%;background:var(--pole-color);color:#070d12;
    border:none;border-radius:14px;padding:16px 24px;
    font-size:1rem;font-weight:700;cursor:pointer;
    transition:opacity .2s,transform .1s;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn-start:hover{opacity:.9;transform:translateY(-1px)}

  .logo{text-align:center;margin-bottom:28px;font-size:1rem;font-weight:700;color:var(--muted)}
  .logo span{color:var(--pole-color)}

  /* Spinner */
  .spinner{
    width:40px;height:40px;border:3px solid var(--border);
    border-top-color:var(--pole-color);border-radius:50%;
    animation:spin .7s linear infinite;margin:80px auto;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"><div class="spinner"></div></div>

<script>
const DISCORD_SERVER = 'https://discord.gg/YbA6wrMB';
const TELEGRAM_CH   = 'https://t.me/sydeco';

// Polo context — color, emoji, canal Discord, mensaje de bienvenida
const POLO_DATA = {
  1: {
    color: '#2ee59d',
    emoji: '🚀',
    label: 'Trading & Mercados',
    canal: '#trading-diario',
    msg: 'Tu polo está en la vanguardia de los mercados. Cada día recibirás un análisis de crypto, tendencias macro y movimientos clave — curado para que tomes decisiones con criterio, no con ruido. Bienvenido al nivel donde el conocimiento se convierte en ventaja.'
  },
  2: {
    color: '#5baeff',
    emoji: '💰',
    label: 'Ahorro & Bases',
    canal: '#ahorro-diario',
    msg: 'Empezar desde las bases es la decisión más inteligente que puedes tomar. Tu polo te dará contexto sobre economía cotidiana, inflación y hábitos que marcan la diferencia a largo plazo. La riqueza no se construye de golpe — se construye con constancia.'
  },
  3: {
    color: '#ff9f43',
    emoji: '🏛️',
    label: 'Inversión & Patrimonio',
    canal: '#inversion-diario',
    msg: 'Tu polo es el de quien piensa a largo plazo. Bolsa, fondos indexados, inmobiliario, planificación patrimonial — el dinero como herramienta de construcción, no de especulación. Cada briefing diario te dará piezas para un puzzle que vale la pena completar.'
  },
  4: {
    color: '#c77aff',
    emoji: '🤝',
    label: 'Finanzas Personales',
    canal: '#finanzas-diario',
    msg: 'Controlar tus finanzas personales es el acto más liberador que existe. Tu polo te ayudará a entender a dónde va tu dinero, cómo optimizarlo y cómo construir un colchón que te dé opciones. La libertad financiera empieza aquí.'
  },
  5: {
    color: '#2ee59d',
    emoji: '🌻',
    label: 'Jardín',
    canal: '#jardin-diario',
    msg: 'Empezar a entender el dinero es uno de los mejores regalos que puedes hacerte. En tu polo no hay prisa, no hay jerga y no hay preguntas tontas. Solo conceptos claros, a tu ritmo, que te irán dando una base sólida para tomar mejores decisiones en el futuro.'
  },
  6: {
    color: '#5baeff',
    emoji: '🦅',
    label: 'Cielo',
    canal: '#trading-diario',
    msg: 'Has alcanzado el nivel más alto de SYD. Tu polo es el de los sistemas: bots de trading, automatización, estrategias algorítmicas. Aquí el conocimiento se convierte en infraestructura. Bienvenido al nivel donde el dinero trabaja mientras tú no.'
  },
};

const DEFAULT_POLO = {
  color: '#2ee59d', emoji: '🌱', label: 'SYD',
  canal: '#general',
  msg: 'Bienvenido/a a SYD. Tu camino de educación financiera empieza hoy.'
};

async function init() {
  const user = await syd.me().catch(() => null);
  if (!user) { location.href = '/syd/login.html'; return; }

  const polo = POLO_DATA[user.pole_id] || DEFAULT_POLO;

  // Apply pole color
  document.documentElement.style.setProperty('--pole-color', polo.color);

  const firstName = (user.username || '').split(' ')[0];

  document.getElementById('app').innerHTML = `
    <div class="welcome-card">
      <div class="logo">SY<span>D</span></div>

      <div style="text-align:center">
        <div class="pole-badge">${polo.emoji} ${polo.label}</div>
      </div>

      <span class="welcome-icon">${polo.emoji}</span>

      <h1>Hola, <span>${firstName}</span> 👋</h1>
      <p class="welcome-sub">Tu cuenta está lista. Este es tu punto de partida.</p>

      <div class="context-msg">${polo.msg}</div>

      <div class="community-section">
        <div class="community-label">Tu briefing diario te espera aquí</div>
        <div class="community-links">
          <a href="${TELEGRAM_CH}" target="_blank" rel="noopener" class="btn-community btn-telegram">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.088 14.13l-2.95-.924c-.64-.204-.654-.64.136-.954l11.52-4.44c.533-.194 1.001.13.768.436z"/></svg>
            @sydeco
            <span class="channel-hint">Canal Telegram</span>
          </a>
          <a href="${DISCORD_SERVER}" target="_blank" rel="noopener" class="btn-community btn-discord">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
            SyD_eco
            <span class="channel-hint">${polo.canal}</span>
          </a>
        </div>
      </div>

      <button class="btn-start" onclick="location.href='/syd/home.html'">
        Empezar mi camino en SYD →
      </button>
    </div>
  `;
}

init();
</script>
</body>
</html>
