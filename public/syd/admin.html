<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — SeedYourDreams</title>
<style>
  :root{--bg:#070d12;--card:#0d1821;--border:#1a2940;--green:#2ee59d;--blue:#5baeff;--orange:#ff9f43;--purple:#c77aff;--red:#ff6b6b;--text:#e8f4f8;--muted:#7a9bb5}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:960px;margin:0 auto;padding:0 20px}
  nav{border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-size:1rem;font-weight:700}.logo span{color:var(--orange)}
  .nav-badge{background:rgba(255,159,67,.12);border:1px solid rgba(255,159,67,.3);color:var(--orange);font-size:.72rem;padding:3px 9px;border-radius:10px;font-weight:700}
  .page{padding:28px 0 60px}
  h1{font-size:1.3rem;font-weight:800;margin-bottom:20px}

  /* AUTH GATE */
  .auth-gate{display:flex;align-items:center;justify-content:center;min-height:60vh}
  .auth-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:32px;width:100%;max-width:360px;text-align:center}
  .auth-box h2{margin-bottom:6px;font-size:1.2rem}
  .auth-box p{color:var(--muted);font-size:.88rem;margin-bottom:20px}
  input{width:100%;background:#0a1520;border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:.95rem;outline:none;transition:border-color .2s;margin-bottom:12px}
  input:focus{border-color:var(--orange)}
  .btn-auth{width:100%;padding:12px;border-radius:8px;background:var(--orange);color:#070d12;font-weight:700;font-size:.95rem;border:none;cursor:pointer}

  /* STATS GRID */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:28px}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center}
  .kpi-num{font-size:2rem;font-weight:900;margin-bottom:4px}
  .kpi-label{color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:.04em}

  /* TABLES */
  .section{margin-bottom:28px}
  .section-title{font-size:1rem;font-weight:700;margin-bottom:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-size:.8rem}
  table{width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
  th{text-align:left;padding:10px 14px;font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border)}
  td{padding:10px 14px;font-size:.85rem;border-bottom:1px solid var(--border)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(255,255,255,.02)}

  .pole-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}

  /* REFRESH */
  .header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .btn-refresh{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:.82rem;transition:all .15s}
  .btn-refresh:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
  .last-update{color:var(--muted);font-size:.78rem}

  .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .6s linear infinite;margin:40px auto;display:block}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<nav>
  <div class="logo"><a href="/syd/home.html"><span>Seed</span>YourDreams</a></div>
  <span class="nav-badge">ADMIN</span>
</nav>

<div class="wrap page" id="main">
  <div class="auth-gate" id="auth-gate">
    <div class="auth-box">
      <h2>🔐 Panel Admin</h2>
      <p>Introduce el token de acceso</p>
      <input id="token-input" type="password" placeholder="Admin token" autocomplete="off">
      <button class="btn-auth" onclick="authenticate()">Entrar</button>
    </div>
  </div>
  <div id="dashboard" style="display:none"></div>
</div>

<script>
const POLE_COLORS = { 1:'#2ee59d', 2:'#5baeff', 3:'#ff9f43', 4:'#c77aff' };
const POLE_NAMES  = { 1:'Norte', 2:'Sur', 3:'Este', 4:'Oeste' };
let adminToken = '';

document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') authenticate();
});

async function authenticate() {
  adminToken = document.getElementById('token-input').value.trim();
  if (!adminToken) return;
  await loadStats();
}

async function loadStats() {
  const dash = document.getElementById('dashboard');
  dash.innerHTML = '<div class="spinner"></div>';
  dash.style.display = 'block';

  try {
    const res = await fetch('/api/syd/admin/stats', {
      headers: { 'Authorization': 'Bearer ' + adminToken }
    });
    if (res.status === 401) {
      dash.style.display = 'none';
      document.getElementById('auth-gate').style.display = 'flex';
      document.getElementById('token-input').value = '';
      document.getElementById('token-input').style.borderColor = 'var(--red)';
      return;
    }
    const data = await res.json();
    document.getElementById('auth-gate').style.display = 'none';
    renderDashboard(data);
  } catch {
    dash.innerHTML = '<p style="color:var(--red);padding:20px">Error al cargar datos</p>';
  }
}

function renderDashboard(d) {
  const dash = document.getElementById('dashboard');
  const now = new Date().toLocaleTimeString('es-ES');
  const retRate = d.users > 0 ? Math.round((d.dau_24h / d.users) * 100) : 0;

  dash.innerHTML = `
    <div class="header-row">
      <h1>📊 Dashboard SYD</h1>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="last-update">Actualizado ${now}</span>
        <button class="btn-refresh" onclick="loadStats()">↻ Refresh</button>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi">
        <div class="kpi-num" style="color:var(--orange)">${d.users}</div>
        <div class="kpi-label">Usuarios totales</div>
      </div>
      <div class="kpi">
        <div class="kpi-num" style="color:var(--green)">${d.dau_24h}</div>
        <div class="kpi-label">DAU (24h)</div>
      </div>
      <div class="kpi">
        <div class="kpi-num" style="color:var(--blue)">${retRate}%</div>
        <div class="kpi-label">Tasa actividad</div>
      </div>
      <div class="kpi">
        <div class="kpi-num" style="color:var(--purple)">${d.total_checkins}</div>
        <div class="kpi-label">Checkins totales</div>
      </div>
      <div class="kpi">
        <div class="kpi-num" style="color:var(--green)">${d.total_lessons}</div>
        <div class="kpi-label">Lecciones completadas</div>
      </div>
      <div class="kpi">
        <div class="kpi-num" style="color:var(--orange)">${d.trades.total}</div>
        <div class="kpi-label">Trades totales</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;flex-wrap:wrap">
      <div class="kpi" style="text-align:left;padding:18px 20px">
        <div style="font-size:.78rem;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em">Wish-Trade breakdown</div>
        <div style="display:flex;gap:20px">
          <div><div style="font-size:1.4rem;font-weight:800;color:var(--green)">${d.trades.won}</div><div style="font-size:.75rem;color:var(--muted)">Ganados</div></div>
          <div><div style="font-size:1.4rem;font-weight:800;color:var(--red)">${d.trades.lost}</div><div style="font-size:.75rem;color:var(--muted)">Perdidos</div></div>
          <div><div style="font-size:1.4rem;font-weight:800;color:var(--orange)">${d.trades.open}</div><div style="font-size:.75rem;color:var(--muted)">Abiertos</div></div>
        </div>
      </div>
      <div class="kpi" style="text-align:left;padding:18px 20px">
        <div style="font-size:.78rem;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em">Últimos registros</div>
        ${d.recent_registrations.map(u => `
          <div style="display:flex;justify-content:space-between;padding:3px 0;font-size:.82rem">
            <span style="font-weight:600">${u.username}</span>
            <span style="color:var(--muted)">${u.joined}</span>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="section">
      <div class="section-title">Top usuarios por XP</div>
      <table>
        <thead><tr>
          <th>#</th><th>Usuario</th><th>Polo</th><th>XP</th><th>BRT</th><th>Streak</th><th>Registro</th>
        </tr></thead>
        <tbody>
          ${d.top_users.map((u, i) => `
            <tr>
              <td style="color:var(--muted)">${i + 1}</td>
              <td style="font-weight:600">${u.username}</td>
              <td>
                <span class="pole-dot" style="background:${POLE_COLORS[u.pole_id] || '#fff'}"></span>
                ${POLE_NAMES[u.pole_id] || '—'}
              </td>
              <td style="color:var(--orange);font-weight:700">${u.xp}</td>
              <td style="color:#ffd700;font-weight:700">${u.bertcoins}</td>
              <td style="color:${u.streak > 0 ? 'var(--red)' : 'var(--muted)'}">${u.streak > 0 ? '🔥 ' + u.streak : '—'}</td>
              <td style="color:var(--muted);font-size:.78rem">${u.joined}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}
</script>
</body>
</html>
